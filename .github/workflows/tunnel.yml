name: Deploy (public tunnel)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: GITHUB_PAGES=true npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /badloggen

      - name: Serve and expose via localhost.run
        run: |
          npx --yes serve out -l 3000 &
          sleep 3
          ssh -o StrictHostKeyChecking=no -R 80:localhost:3000 nokey@localhost.run 2>&1 | tee tunnel.log &
          sleep 10
          grep -o 'https://[^ ]*' tunnel.log | head -1 > public_url.txt
          cat public_url.txt

      - name: Show URL
        run: |
          echo "Public URL:"
          cat public_url.txt || echo "Tunnel URL not captured - check workflow logs"
